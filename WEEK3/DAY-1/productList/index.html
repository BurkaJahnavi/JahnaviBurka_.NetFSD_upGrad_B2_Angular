<!DOCTYPE html>
<html>
<head>
    <title>Product List - Add to Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h2>My Store</h2>
    <div class="cart">
        🛒 Cart Items: <span id="cartCount">0</span>
    </div>
</header>

<div class="products">

    <div class="product">
        <h3>Wireless Mouse</h3>
        <p class="price">₹500</p>
        <button class="addBtn">Add to Cart</button>
        <span class="message"></span>
    </div>

    <div class="product">
        <h3>Keyboard</h3>
        <p class="price">₹800</p>
        <button class="addBtn">Add to Cart</button>
        <span class="message"></span>
    </div>

    <div class="product">
        <h3>Headphones</h3>
        <p class="price">₹1200</p>
        <button class="addBtn">Add to Cart</button>
        <span class="message"></span>
    </div>

    <div class="product">
        <h3>Smart Watch</h3>
        <p class="price">₹1500</p>
        <button class="addBtn">Add to Cart</button>
        <span class="message"></span>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>

</body>
</html>
