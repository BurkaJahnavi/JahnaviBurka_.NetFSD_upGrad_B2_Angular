<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electronics Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
    </style>

</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="text-center mb-5">Electronics Store</h2>

    <div class="row g-4">

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=600" class="card-img-top" alt="Laptop">
                <div class="card-body d-flex flex-column text-center">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">High performance laptop for professionals.</p>
                    <p class="fw-bold text-primary">₹55,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600" class="card-img-top" alt="Smartphone">
                <div class="card-body d-flex flex-column text-center">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text">Latest 5G smartphone with amazing camera.</p>
                    <p class="fw-bold text-primary">₹25,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600" class="card-img-top" alt="Headphones">
                <div class="card-body d-flex flex-column text-center">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text">Noise cancelling wireless headphones.</p>
                    <p class="fw-bold text-primary">₹5,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
                <img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?w=600" class="card-img-top" alt="Smartwatch">
                <div class="card-body d-flex flex-column text-center">
                    <h5 class="card-title">Smartwatch</h5>
                    <p class="card-text">Fitness tracking smartwatch with AMOLED display.</p>
                    <p class="fw-bold text-primary">₹8,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                        <button class="btn btn-outline-secondary w-100">View Details</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
